# Palm Beach County, FL — source catalog (machine-readable registry)
# The maintained map of {jurisdiction -> data/permit source}. First population of the
# source-discovery deliverable (Soofi, 2026-06-29). status: discovery complete (40/40
# jurisdictions triaged); certify with scripts/permit-source-discovery/certify.mjs.
county: Palm Beach
state: FL
parcel_id:
  name: PCN  # Property Control Number
  digits: 17
  municipality_digits: "1-2"   # 00 = unincorporated
  example: "00424414630111105"

# ---- countywide sources (one each) ----
appraisal:
  source: Palm Beach County Property Appraiser (PAPA)
  host: https://pbcpao.gov
  access: plain-http                # no browser / no Cloudflare (tested)
  search_api:
    method: POST
    url: https://pbcpao.gov/AutoComplete/SearchAutoComplete
    body: "propertyType=RE&searchText=<query>"
    header: "X-Requested-With: XMLHttpRequest"
    returns: '[{ text: "<owner> | <address>", pcn: "P:<17-digit>" }]'
  detail_url: "https://pbcpao.gov/Property/Details?parcelId=<PCN>"
  parcel_count_2025: 659119        # AC test number (reconcile vs seed at load)
  market_value_2025: 513305769954
sunbiz:
  source: FL Division of Corporations (statewide)
  bulk: https://dos.fl.gov/sunbiz/other-services/data-downloads/   # 200 OK plain
  live_search: https://search.sunbiz.org/   # Cloudflare challenge -> headless browser
  note: reuse Lee toolchain; only the PB ZIP-prefix list is new
bbb:
  source: Better Business Bureau (national)
  note: reuse Lee category harvest, filter to PB area
gis:
  rest: https://maps.co.palm-beach.fl.us/arcgis/rest/services
  municipalities_layer: /PZB/Municipalities/MapServer/0   # 40 features
  parcels_layer: /Parcels/Parcels/MapServer/0             # CACHED tile - not countable

