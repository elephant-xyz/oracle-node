Comment: Elephant Express workflow. Triggered by Starter Lambda with one SQS message payload.
StartAt: ValidateWorkflowBranch
States:
  ValidateWorkflowBranch:
    Type: Choice
    Comment: "Validate Workflow Branch before starting workflow work"
    Choices:
      - Variable: $.workflowBranch
        IsPresent: false
        Next: DefaultWorkflowBranch
      - Variable: $.workflowBranch
        StringEquals: structured_archive
        Next: CheckDirectSubmit
      - Variable: $.workflowBranch
        StringEquals: minting
        Next: CheckDirectSubmit
    Default: InvalidWorkflowBranch

  DefaultWorkflowBranch:
    Type: Pass
    QueryLanguage: JSONata
    Comment: "Default omitted Workflow Branch to Structured Archive"
    Output: "{% $merge([$states.input, { 'workflowBranch': 'structured_archive' }]) %}"
    Next: CheckDirectSubmit

  InvalidWorkflowBranch:
    Type: Fail
    Error: InvalidWorkflowBranch
    Cause: "workflowBranch must be structured_archive or minting"

  CheckDirectSubmit:
    Type: Choice
    Comment: "Check if this is a direct-submit execution (transactionItems provided in message)"
    Choices:
      - Variable: $.message.hash.transactionItems
        IsPresent: true
        Next: PrepareDirectSubmitInput
    Default: Preprocess

  PrepareDirectSubmitInput:
    Type: Pass
    QueryLanguage: JSONata
    Comment: "Restructure direct-submit input from { message: { pre, hash } } to { pre, hash } at root level"
    Output: >-
      {%
        {
          "pre": $states.input.message.pre,
          "hash": $states.input.message.hash
        }
      %}
    Next: EmitSubmitScheduled

  Preprocess:
    Type: Task
    Resource: arn:aws:states:::lambda:invoke
    Parameters:
      FunctionName: ${WorkflowPreProcessorFunction}
      Payload.$: $.message
    ResultSelector:
      county_prep_input_s3_uri.$: $.Payload.county_prep_input_s3_uri
      output_prefix.$: $.Payload.output_prefix
      seed_output_s3_uri.$: $.Payload.seed_output_s3_uri
      county_name.$: $.Payload.county_name
      county_key.$: $.Payload.county_key
      parcel_identifier.$: $.Payload.parcel_identifier
      request_identifier.$: $.Payload.request_identifier
      best_permit_address.$: $.Payload.best_permit_address
    ResultPath: $.pre
    Next: BuildRepairParamName
    Retry:
      - ErrorEquals:
          [
            Lambda.ServiceException,
            Lambda.AWSLambdaException,
            Lambda.SdkClientException,
          ]
        IntervalSeconds: 2
        MaxAttempts: 2
        BackoffRate: 2
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.preprocessError
        Next: WaitForPreprocessResolution

  WaitForPreprocessResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    Comment: "Emit FAILED event for Preprocess and wait for external resolution"
    HeartbeatSeconds: 2592000 # 30 days
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county: "unknown"
            status: FAILED
            phase: Preprocess
            step: Preprocess
            dataGroupLabel: County
            taskToken.$: $$.Task.Token
            errors:
              - code: "00001"
                details:
                  error.$: States.JsonToString($.preprocessError)
    ResultPath: $.resolutionResult
    Next: Preprocess
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "EventBridge emit failed - stay parked and wait again"
        ResultPath: $.preprocessError
        Next: WaitForPreprocessResolution

  BuildRepairParamName:
    Type: Pass
    Parameters:
      repairParam.$: States.Format('/${StackName}/repair/{}', $.pre.county_key)
    ResultPath: $.repair
    Next: GetCountyRepairFlag

  GetCountyRepairFlag:
    Type: Task
    Resource: arn:aws:states:::aws-sdk:ssm:getParameter
    Parameters:
      Name.$: $.repair.repairParam
      WithDecryption: false
    ResultPath: $.countyRepair
    Next: ShouldAttemptSkip
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.countyRepair
        Next: DefaultRepairTrue

  DefaultRepairTrue:
    Type: Pass
    Parameters:
      Parameter:
        Value: "true"
    ResultPath: $.countyRepair
    Next: ShouldAttemptSkip

  ShouldAttemptSkip:
    Type: Choice
    Choices:
      - Variable: $.countyRepair.Parameter.Value
        StringEquals: "true"
        Next: BuildHeadParams
    Default: EmitPrepareScheduled

  BuildHeadParams:
    Type: Pass
    QueryLanguage: JSONata
    Comment: "Parse pre.output_prefix (s3://bucket/prefix) to derive bucket, key (prefix/output.zip), and expectedOutputUri"
    Output: >-
      {%
        {
          "head": {
            "bucket": $split($split($states.input.pre.output_prefix, "s3://")[1], "/")[0],
            "key": $substringAfter($states.input.pre.output_prefix, "s3://" & $split($split($states.input.pre.output_prefix, "s3://")[1], "/")[0] & "/") & '/output.zip',
            "expectedOutputUri": $states.input.pre.output_prefix & '/output.zip'
          },
          "message": $states.input.message,
          "pre": $states.input.pre,
          "workflowBranch": $states.input.workflowBranch
        }
      %}
    Next: HeadOutputZip

  HeadOutputZip:
    Type: Task
    Resource: arn:aws:states:::aws-sdk:s3:headObject
    Parameters:
      Bucket.$: $.head.bucket
      Key.$: $.head.key
    ResultPath: $.headResult
    Next: BypassPrepare
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.headError
        Next: EmitPrepareScheduled

  BypassPrepare:
    Type: Pass
    Parameters:
      output_s3_uri.$: $.head.expectedOutputUri
      prepareSkipped: true
    ResultPath: $.prepare
    Next: EmitBypassPrepareSucceeded

  EmitBypassPrepareSucceeded:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: Prepare
            step: Prepare
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: EmitTransformScheduled
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: EmitTransformScheduled

  EmitPrepareScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: Prepare
            step: Prepare
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: GetPrepareQueueUrl
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: GetPrepareQueueUrl

  GetPrepareQueueUrl:
    Type: Task
    Resource: arn:aws:states:::aws-sdk:sqs:getQueueUrl
    QueryLanguage: JSONata
    Comment: "Get queue URL by name (lowercase, spaces replaced with hyphens). Throws Sqs.QueueDoesNotExistException if queue not found."
    Arguments:
      QueueName: "{% '${StackName}-prepare-queue-' & $replace($replace($lowercase($states.input.pre.county_name), ' ', '-'), '.', '') %}"
    Output: "{% $merge([$states.input, { 'queue': $states.result }]) %}"
    Next: Prepare
    Catch:
      - ErrorEquals: [Sqs.QueueDoesNotExistException]
        Output: "{% $merge([$states.input, { 'prepareError': $states.errorOutput }]) %}"
        Next: EmitPrepareQueueNotFound

  Prepare:
    Type: Task
    Resource: arn:aws:states:::sqs:sendMessage.waitForTaskToken
    Comment: "Send prepare job to SQS queue. Lambda downloads input from S3, runs prepare, uploads output, and calls back with task token."
    Parameters:
      QueueUrl.$: $.queue.QueueUrl
      MessageBody:
        taskToken.$: $$.Task.Token
        executionId.$: $$.Execution.Name
        input_s3_uri.$: $.pre.county_prep_input_s3_uri
        output_s3_uri_prefix.$: $.pre.output_prefix
        browser: true
        county.$: $.pre.county_name
    ResultSelector:
      output_s3_uri.$: $.output_s3_uri
      county.$: $.county
      taskToken.$: $.taskToken
      prepareSkipped: false
    ResultPath: $.prepare
    Next: ReportPrepareLambdaSuccess
    Retry:
      - ErrorEquals:
          [
            Lambda.ServiceException,
            Lambda.AWSLambdaException,
            Lambda.SdkClientException,
          ]
        IntervalSeconds: 5
        MaxAttempts: 3
        BackoffRate: 2
    Catch:
      - ErrorEquals: [States.Timeout]
        ResultPath: $.prepareError
        Next: EmitPrepareFailed
      - ErrorEquals: [States.ALL]
        ResultPath: $.prepareError
        Next: EmitPrepareFailed

  EmitPrepareQueueNotFound:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    Comment: "Emit FAILED event with taskToken when queue not found. Waits for external retry (e.g., after queue is created)."
    HeartbeatSeconds: 2592000 # 30 days
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: FAILED
            phase: Prepare
            step: Prepare
            dataGroupLabel: County
            taskToken.$: $$.Task.Token
            errors:
              - code: "01001"
                details.$: $.prepareError
    ResultPath: $.queueNotFoundResult
    Next: GetPrepareQueueUrl
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "EventBridge emit failed - stay parked and wait again"
        ResultPath: $.error
        Next: EmitPrepareQueueNotFound

  ReportPrepareLambdaSuccess:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.prepare.county
            status: SUCCEEDED
            phase: Prepare
            step: Prepare
            dataGroupLabel: County
            taskToken.$: $.prepare.taskToken
    ResultPath: $.eventResult
    Next: EmitTransformScheduled
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: EmitTransformScheduled

  EmitPrepareFailed:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    QueryLanguage: JSONata
    Comment: "Emit FAILED event with actual error code from Lambda. Waits for external sendTaskSuccess to resume."
    HeartbeatSeconds: 2592000 # 30 days
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: Prepare
            step: Prepare
            dataGroupLabel: County
            taskToken: "{% $states.context.Task.Token %}"
            errors:
              - code: "{% $states.input.prepareError.Error %}"
                details:
                  cause: "{% $states.input.prepareError.Cause %}"
    Output: "{% $merge([$states.input, { 'failedResult': $states.result }]) %}"
    Next: Prepare
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "EventBridge emit failed - stay parked and wait again"
        Output: "{% $merge([$states.input, { 'error': $states.errorOutput }]) %}"
        Next: EmitPrepareFailed

  # === TRANSFORM STEP ===

  EmitTransformScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SCHEDULED event for Transform step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: Transform
            step: Transform
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: Transform
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: Transform

  Transform:
    Type: Task
    Resource: arn:aws:states:::sqs:sendMessage.waitForTaskToken
    Comment: "Run Transform step via SQS + Lambda worker with task token callback"
    Parameters:
      QueueUrl: ${TransformQueueUrl}
      MessageBody:
        taskToken.$: $$.Task.Token
        input:
          inputS3Uri.$: $.prepare.output_s3_uri
          county.$: $.pre.county_name
          outputPrefix.$: $.pre.output_prefix
          executionId.$: $$.Execution.Name
    ResultSelector:
      transformedOutputS3Uri.$: $.transformedOutputS3Uri
      county.$: $.county
      executionId.$: $$.Execution.Name
      propertyFirstPermitEligibility.$: $.propertyFirstPermitEligibility
    ResultPath: $.transform
    Next: EmitTransformSucceeded
    Retry:
      - ErrorEquals: [States.Timeout]
        IntervalSeconds: 5
        MaxAttempts: 2
        BackoffRate: 2
    Catch:
      - ErrorEquals: [ScriptsFailedError]
        Comment: "Transform scripts failed - park for resolution"
        ResultPath: $.transformError
        Next: WaitForTransformResolution
      - ErrorEquals: [States.ALL]
        ResultPath: $.transformError
        Next: WaitForTransformResolution

  EmitTransformSucceeded:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SUCCEEDED event for Transform step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: Transform
            step: Transform
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: ChoosePostTransformBranch
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: ChoosePostTransformBranch

  ChoosePostTransformBranch:
    Type: Choice
    Comment: "Choose Structured Archive by default, enqueue property-first permits for seeded Lee runs, or Minting when explicitly requested. Archive + property-first now run SVL validation first (parity with minting) so no parcel is loaded/enqueued without schema validation."
    Choices:
      - Variable: $.workflowBranch
        StringEquals: minting
        Next: EmitSvlScheduled
    Default: EmitArchiveSvlScheduled

  EmitArchiveSvlScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SCHEDULED event for the archive/property-first SVL validation gate"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: SVL
            step: SVL
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: ArchiveSvl
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: ArchiveSvl

  ArchiveSvl:
    Type: Task
    Resource: arn:aws:states:::sqs:sendMessage.waitForTaskToken
    Comment: "Run Schema Validation Layer for archive/property-first parcels (parity with minting). A parcel must validate before it is loaded to Neon or enqueued for permits."
    Parameters:
      QueueUrl: ${SvlQueueUrl}
      MessageBody:
        taskToken.$: $$.Task.Token
        input:
          transformedOutputS3Uri.$: $.transform.transformedOutputS3Uri
          county.$: $.pre.county_name
          outputPrefix.$: $.pre.output_prefix
          executionId.$: $$.Execution.Name
          preparedS3Uri.$: $.prepare.output_s3_uri
          s3.$: $.message.s3
    ResultSelector:
      validatedOutputS3Uri.$: $.validatedOutputS3Uri
      county.$: $.county
      executionId.$: $$.Execution.Name
      validationPassed.$: $.validationPassed
      svlErrors.$: $.svlErrors
    ResultPath: $.svl
    Next: CheckArchiveSvlResult
    Retry:
      - ErrorEquals: [States.Timeout]
        IntervalSeconds: 5
        MaxAttempts: 2
        BackoffRate: 2
    Catch:
      - ErrorEquals: [SvlFailedError]
        Comment: "SVL validation failed - park for resolution (retry target is Transform)"
        ResultPath: $.svlError
        Next: WaitForSvlExceptionResolution
      - ErrorEquals: [States.ALL]
        ResultPath: $.svlError
        Next: WaitForSvlExceptionResolution

  CheckArchiveSvlResult:
    Type: Choice
    Comment: "Fail-closed: a parcel that does not validate is parked, never loaded/enqueued"
    Choices:
      - Variable: $.svl.validationPassed
        BooleanEquals: false
        Next: WaitForSvlValidationResolution
    Default: ChooseArchivePostSvl

  ChooseArchivePostSvl:
    Type: Choice
    Comment: "After SVL passes, resume the original archive/property-first routing"
    Choices:
      - Variable: $.message.propertyFirstPermitQueueUrl
        IsPresent: true
        Next: ChoosePropertyFirstPermitEligibility
    Default: EmitStructuredArchiveSucceeded

  ChoosePropertyFirstPermitEligibility:
    Type: Choice
    Comment: "Only commercial/permit-priority appraisals should continue to Accela property-first permit retrieval"
    Choices:
      - Variable: $.transform.propertyFirstPermitEligibility.shouldEnqueue
        BooleanEquals: true
        Next: EmitPropertyFirstPermitScheduled
    Default: EmitPropertyFirstPermitSkipped

  EmitPropertyFirstPermitSkipped:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SUCCEEDED event when property-first permits are intentionally skipped for a non-commercial appraisal"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: PropertyFirstPermits
            step: SkipPropertyFirstPermit
            dataGroupLabel: County
            parcelIdentifier.$: $.pre.parcel_identifier
            requestIdentifier.$: $.pre.request_identifier
            propertyUsageType.$: $.transform.propertyFirstPermitEligibility.propertyUsageType
            skipReason.$: $.transform.propertyFirstPermitEligibility.reason
            eligibilityManifestS3Uri.$: $.transform.propertyFirstPermitEligibility.manifestS3Uri
            appraisalOutputS3Uri.$: $.transform.transformedOutputS3Uri
    ResultPath: $.eventResult
    Next: EmitStructuredArchiveSucceeded
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: EmitStructuredArchiveSucceeded

  EmitPropertyFirstPermitScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SCHEDULED event before handing the completed appraisal artifact to property-first permit harvesting"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: PropertyFirstPermits
            step: EnqueuePropertyFirstPermit
            dataGroupLabel: County
            parcelIdentifier.$: $.pre.parcel_identifier
            requestIdentifier.$: $.pre.request_identifier
    ResultPath: $.eventResult
    Next: EnqueuePropertyFirstPermit
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: EnqueuePropertyFirstPermit

  EnqueuePropertyFirstPermit:
    Type: Task
    Resource: arn:aws:states:::sqs:sendMessage
    Comment: "Queue a property-first Accela permit harvest after the appraisal transform artifact is ready"
    Parameters:
      QueueUrl.$: $.message.propertyFirstPermitQueueUrl
      MessageBody:
        type: lee-property-first-permit-parcel
        version: 1
        jobId.$: $.message.propertyFirstPermitJobId
        parcelIdentifier.$: $.pre.parcel_identifier
        requestIdentifier.$: $.pre.request_identifier
        appraisalOutputS3Uri.$: $.transform.transformedOutputS3Uri
        appraisalPreparedOutputS3Uri.$: $.prepare.output_s3_uri
        bestPermitAddress.$: $.pre.best_permit_address
        outputPrefix.$: $.message.propertyFirstPermitOutputPrefix
        maxPages.$: $.message.propertyFirstPermitMaxPages
        skipExisting: true
        skipCompleted: true
        loadToNeon: true
        loadAppraisalToNeon: true
    ResultPath: $.propertyFirstPermit
    Next: EmitPropertyFirstPermitEnqueued
    Retry:
      - ErrorEquals: [States.TaskFailed, SQS.InvalidMessageContents]
        IntervalSeconds: 2
        MaxAttempts: 3
        BackoffRate: 2
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.propertyFirstPermitError
        Next: WaitForPropertyFirstPermitEnqueueResolution

  EmitPropertyFirstPermitEnqueued:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SUCCEEDED event after the property-first permit message is accepted by SQS"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: PropertyFirstPermits
            step: EnqueuePropertyFirstPermit
            dataGroupLabel: County
            parcelIdentifier.$: $.pre.parcel_identifier
            requestIdentifier.$: $.pre.request_identifier
            appraisalOutputS3Uri.$: $.transform.transformedOutputS3Uri
    ResultPath: $.eventResult
    Next: EmitStructuredArchiveSucceeded
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: EmitStructuredArchiveSucceeded

  WaitForPropertyFirstPermitEnqueueResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    Comment: "Emit FAILED event if property-first permit enqueue fails, then wait for manual resolution"
    HeartbeatSeconds: 2592000
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: FAILED
            phase: PropertyFirstPermits
            step: EnqueuePropertyFirstPermit
            dataGroupLabel: County
            taskToken.$: $$.Task.Token
            parcelIdentifier.$: $.pre.parcel_identifier
            requestIdentifier.$: $.pre.request_identifier
            errors:
              - code: "70001"
                details:
                  error.$: States.JsonToString($.propertyFirstPermitError)
    ResultPath: $.propertyFirstPermitResolutionResult
    Next: EnqueuePropertyFirstPermit
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.propertyFirstPermitEventError
        Next: WaitForPropertyFirstPermitEnqueueResolution

  EmitStructuredArchiveSucceeded:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SUCCEEDED event for Structured Archive branch"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: StructuredArchive
            step: StructuredArchive
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: WorkflowComplete
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: WorkflowComplete

  WaitForTransformResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    QueryLanguage: JSONata
    Comment: "Emit FAILED event and wait for external resolution - retry target is Transform"
    HeartbeatSeconds: 2592000 # 30 days
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: Transform
            step: Transform
            dataGroupLabel: County
            taskToken: "{% $states.context.Task.Token %}"
            errors:
              - code: "{% '20' & $states.input.pre.county_name %}"
                details:
                  error: "{% $string($states.input.transformError) %}"
    Output: "{% $states.input %}"
    Next: Transform
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "Resolution failed - stay parked and wait again"
        Output: "{% $states.input %}"
        Next: WaitForTransformResolution

  # === SVL (Schema Validation Layer) STEP ===

  EmitSvlScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SCHEDULED event for SVL step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: SVL
            step: SVL
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: SVL
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: SVL

  SVL:
    Type: Task
    Resource: arn:aws:states:::sqs:sendMessage.waitForTaskToken
    Comment: "Run Schema Validation Layer via SQS + Lambda worker"
    Parameters:
      QueueUrl: ${SvlQueueUrl}
      MessageBody:
        taskToken.$: $$.Task.Token
        input:
          transformedOutputS3Uri.$: $.transform.transformedOutputS3Uri
          county.$: $.pre.county_name
          outputPrefix.$: $.pre.output_prefix
          executionId.$: $$.Execution.Name
          preparedS3Uri.$: $.prepare.output_s3_uri
          s3.$: $.message.s3
    ResultSelector:
      validatedOutputS3Uri.$: $.validatedOutputS3Uri
      county.$: $.county
      executionId.$: $$.Execution.Name
      validationPassed.$: $.validationPassed
      svlErrors.$: $.svlErrors
    ResultPath: $.svl
    Next: CheckSvlResult
    Retry:
      - ErrorEquals: [States.Timeout]
        IntervalSeconds: 5
        MaxAttempts: 2
        BackoffRate: 2
    Catch:
      - ErrorEquals: [SvlFailedError]
        Comment: "SVL validation failed - park for resolution"
        ResultPath: $.svlError
        Next: WaitForSvlExceptionResolution
      - ErrorEquals: [States.ALL]
        ResultPath: $.svlError
        Next: WaitForSvlExceptionResolution

  CheckSvlResult:
    Type: Choice
    Comment: "Check if SVL validation passed or failed (errors saved to DynamoDB)"
    Choices:
      - Variable: $.svl.validationPassed
        BooleanEquals: false
        Next: WaitForSvlValidationResolution
    Default: EmitSvlSucceeded

  EmitSvlSucceeded:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SUCCEEDED event for SVL step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: SVL
            step: SVL
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: EmitHashScheduled
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: EmitHashScheduled

  WaitForSvlValidationResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    QueryLanguage: JSONata
    Comment: "Emit FAILED event with individual validation errors and wait for external resolution - retry target is Transform"
    HeartbeatSeconds: 2592000 # 30 days
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: SVL
            step: SVL
            dataGroupLabel: County
            taskToken: "{% $states.context.Task.Token %}"
            errors: >-
              {%
                [$states.input.svl.svlErrors ~> $map(function($e) {
                  {
                    "code": "30" & $e.error_hash,
                    "details": {
                      "error_message": $e.error_message,
                      "error_path": $e.error_path,
                      "data_group_cid": $e.data_group_cid,
                      "error_hash": $e.error_hash
                    }
                  }
                })]
              %}
    Output: "{% $states.input %}"
    Next: Transform
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "Resolution failed - stay parked and wait again"
        Output: "{% $states.input %}"
        Next: WaitForSvlValidationResolution

  WaitForSvlExceptionResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    Comment: "Emit FAILED event for SVL exception and wait for external resolution - retry target is Transform"
    HeartbeatSeconds: 2592000 # 30 days
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: FAILED
            phase: SVL
            step: SVL
            dataGroupLabel: County
            taskToken.$: $$.Task.Token
            errors:
              - code: "31001"
                details:
                  error.$: States.JsonToString($.svlError)
    ResultPath: $.resolutionResult
    Next: Transform
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "Resolution failed - stay parked and wait again"
        ResultPath: $.svlError
        Next: WaitForSvlExceptionResolution

  # === HASH STEP ===

  EmitHashScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SCHEDULED event for Hash step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: Hash
            step: Hash
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: Hash
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: Hash

  Hash:
    Type: Task
    Resource: arn:aws:states:::sqs:sendMessage.waitForTaskToken
    Comment: "Run Hash generation via SQS + Lambda worker"
    Parameters:
      QueueUrl: ${HashQueueUrl}
      MessageBody:
        taskToken.$: $$.Task.Token
        input:
          validatedOutputS3Uri.$: $.transform.transformedOutputS3Uri
          seedOutputS3Uri.$: $.pre.seed_output_s3_uri
          county.$: $.pre.county_name
          outputPrefix.$: $.pre.output_prefix
          executionId.$: $$.Execution.Name
    ResultSelector:
      seedHashZipS3Uri.$: $.seedHashZipS3Uri
      countyHashZipS3Uri.$: $.countyHashZipS3Uri
      combinedHashCsvS3Uri.$: $.combinedHashCsvS3Uri
      county.$: $.county
      executionId.$: $$.Execution.Name
      propertyCid.$: $.propertyCid
      transactionItems.$: $.transactionItems
    ResultPath: $.hash
    Next: EmitHashSucceeded
    Retry:
      - ErrorEquals: [States.Timeout]
        IntervalSeconds: 5
        MaxAttempts: 2
        BackoffRate: 2
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.hashError
        Next: WaitForHashResolution

  EmitHashSucceeded:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SUCCEEDED event for Hash step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: Hash
            step: Hash
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: EmitUploadScheduled
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: EmitUploadScheduled

  WaitForHashResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    Comment: "Emit FAILED event and wait for external resolution - retry target is Hash"
    HeartbeatSeconds: 2592000 # 30 days
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: FAILED
            phase: Hash
            step: Hash
            dataGroupLabel: County
            taskToken.$: $$.Task.Token
            errors:
              - code: "40001"
                details:
                  error.$: States.JsonToString($.hashError)
    ResultPath: $.resolutionResult
    Next: Hash
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "Resolution failed - stay parked and wait again"
        ResultPath: $.hashError
        Next: WaitForHashResolution

  # === UPLOAD STEP ===

  EmitUploadScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SCHEDULED event for Upload step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: Upload
            step: Upload
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: Upload
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: Upload

  Upload:
    Type: Task
    Resource: arn:aws:states:::sqs:sendMessage.waitForTaskToken
    Comment: "Run Upload to IPFS via SQS + Lambda worker"
    Parameters:
      QueueUrl: ${UploadQueueUrl}
      MessageBody:
        taskToken.$: $$.Task.Token
        input:
          seedHashZipS3Uri.$: $.hash.seedHashZipS3Uri
          countyHashZipS3Uri.$: $.hash.countyHashZipS3Uri
          county.$: $.pre.county_name
          executionId.$: $$.Execution.Name
    ResultSelector:
      uploadSuccess.$: $.uploadSuccess
      county.$: $.county
      executionId.$: $$.Execution.Name
    ResultPath: $.upload
    Next: EmitUploadSucceeded
    Retry:
      - ErrorEquals: [States.Timeout]
        IntervalSeconds: 5
        MaxAttempts: 2
        BackoffRate: 2
    Catch:
      - ErrorEquals: [UploadFailedError]
        Comment: "Upload to IPFS failed - park for resolution"
        ResultPath: $.uploadError
        Next: WaitForUploadResolution
      - ErrorEquals: [States.ALL]
        ResultPath: $.uploadError
        Next: WaitForUploadResolution

  EmitUploadSucceeded:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SUCCEEDED event for Upload step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: Upload
            step: Upload
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: EmitSubmitScheduled
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: EmitSubmitScheduled

  WaitForUploadResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    Comment: "Emit FAILED event and wait for external resolution - retry target is Upload"
    HeartbeatSeconds: 2592000 # 30 days
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: FAILED
            phase: Upload
            step: Upload
            dataGroupLabel: County
            taskToken.$: $$.Task.Token
            errors:
              - code: "50001"
                details:
                  error.$: States.JsonToString($.uploadError)
    ResultPath: $.resolutionResult
    Next: Upload
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "Resolution failed - stay parked and wait again"
        ResultPath: $.uploadError
        Next: WaitForUploadResolution

  # === SUBMIT PHASE ===

  EmitSubmitScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SCHEDULED event for Submit phase"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: Submit
            step: Submit
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: InitializeGasPriceRetry
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: InitializeGasPriceRetry

  # === GAS PRICE CHECK STEP (DynamoDB-based, no Lambda polling) ===
  # Gas price is updated every 5 minutes by GasPriceUpdater cron job Lambda
  # Step Function reads DynamoDB directly and uses Choice state to decide
  # Progressive exponential backoff: min(2^retryCount * 60, 43200) seconds (max 12 hours)

  InitializeGasPriceRetry:
    Type: Pass
    Comment: "Initialize gas price retry counter to 0"
    Result: 0
    ResultPath: $.gasPriceRetryCount
    Next: GetGasPriceFromDynamoDB

  GetGasPriceFromDynamoDB:
    Type: Task
    Resource: arn:aws:states:::dynamodb:getItem
    Comment: "Read current gas price from DynamoDB (updated by cron job)"
    Parameters:
      TableName: ${GasPriceTableName}
      Key:
        PK:
          S: "CURRENT"
    ResultPath: $.dynamoResult
    Next: ParseGasPriceResult
    Retry:
      - ErrorEquals: [States.ALL]
        IntervalSeconds: 5
        MaxAttempts: 2
        BackoffRate: 2
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.gasPriceError
        Next: CalculateGasPriceWait

  ParseGasPriceResult:
    Type: Pass
    QueryLanguage: JSONata
    Comment: "Convert DynamoDB response format to usable values (N type returns string)."
    Output: >-
      {%
        $merge([$states.input, {
          "gasPriceResult": $exists($states.input.dynamoResult.Item)
            ? {
                "value": {
                  "gasPrice": $number($states.input.dynamoResult.Item.gasPrice.N),
                  "updatedAt": $states.input.dynamoResult.Item.updatedAt.S
                }
              }
            : {
                "value": {
                  "gasPrice": 999999,
                  "updatedAt": 999999
                }
              }
        }])
      %}
    Next: CheckGasPriceChoice

  CheckGasPriceChoice:
    Type: Choice
    Comment: "Compare gas price from DynamoDB against configured max threshold (${GasPriceMaxGwei} Gwei)"
    Choices:
      # If gasPrice <= maxGwei, proceed to submit
      - Variable: $.gasPriceResult.value.gasPrice
        NumericLessThanEquals: ${GasPriceMaxGwei}
        Next: EmitSubmitToBlockchainScheduled
    Default: CalculateGasPriceWait

  CalculateGasPriceWait:
    Type: Pass
    QueryLanguage: JSONata
    Comment: "Calculate exponential backoff wait time: min(2^retryCount * 300, 43200) seconds (max 12 hours)"
    Output: >-
      {%
        (
          $baseInterval := 300;
          $maxInterval := 43200;
          $calculated := $power(2, $states.input.gasPriceRetryCount) * $baseInterval;
          $waitSeconds := $min([$calculated, $maxInterval]);
          $merge([$states.input, {
            "gasPriceRetryCount": $states.input.gasPriceRetryCount + 1,
            "gasPriceWaitSeconds": $waitSeconds
          }])
        )
      %}
    Next: WaitForGasPrice

  WaitForGasPrice:
    Type: Wait
    Comment: "Wait with exponential backoff before checking gas price again"
    SecondsPath: $.gasPriceWaitSeconds
    Next: GetGasPriceFromDynamoDB

  # === SUBMIT TO BLOCKCHAIN STEP ===

  EmitSubmitToBlockchainScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SCHEDULED event for Submit to Blockchain step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: Submit
            step: SubmitToBlockchain
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: SubmitToBlockchain
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: SubmitToBlockchain

  SubmitToBlockchain:
    Type: Task
    Resource: arn:aws:states:::sqs:sendMessage.waitForTaskToken
    Comment: "Submit transaction items to blockchain"
    Parameters:
      QueueUrl: ${TransactionsSqsQueueUrl}
      MessageBody.$: States.JsonToString($.hash.transactionItems)
      MessageAttributes:
        TaskToken:
          DataType: String
          StringValue.$: $$.Task.Token
        ExecutionArn:
          DataType: String
          StringValue.$: $$.Execution.Name
        County:
          DataType: String
          StringValue.$: $.pre.county_name
        DataGroupLabel:
          DataType: String
          StringValue: "County"
    ResultSelector:
      taskToken.$: $$.Task.Token
      result.$: $
    ResultPath: $.submit
    Next: EmitSubmitSucceeded
    Retry:
      - ErrorEquals:
          - Sqs.RequestThrottledException
          - Sqs.ThrottlingException
          - Sqs.ServiceUnavailableException
          - Sqs.InternalFailureException
        IntervalSeconds: 2
        MaxAttempts: 2
        BackoffRate: 2
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.submitError
        Next: EmitSubmitFailed

  EmitSubmitSucceeded:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SUCCEEDED event for Submit to Blockchain step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: Submit
            step: SubmitToBlockchain
            dataGroupLabel: County
    ResultPath: $.eventResult
    Next: ExtractTransactionHash
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: ExtractTransactionHash

  EmitSubmitFailed:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    QueryLanguage: JSONata
    Comment: "Emit FAILED event for Submit to Blockchain step with error code from lambda"
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: Submit
            step: SubmitToBlockchain
            dataGroupLabel: County
            errors:
              - code: "{% $states.input.submitError.Error %}"
                details:
                  cause: "{% $states.input.submitError.Cause %}"
    Output: "{% $merge([$states.input, { 'eventResult': $states.result }]) %}"
    Next: WaitForSubmitResolution
    Catch:
      - ErrorEquals: [States.ALL]
        Output: "{% $merge([$states.input, { 'eventError': $states.errorOutput }]) %}"
        Next: WaitForSubmitResolution

  WaitForSubmitResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    QueryLanguage: JSONata
    Comment: "Emit FAILED event and wait for external resolution - retry target is SubmitToBlockchain"
    HeartbeatSeconds: 2592000 # 30 days
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: Submit
            step: SubmitToBlockchain
            dataGroupLabel: County
            taskToken: "{% $states.context.Task.Token %}"
            errors:
              - code: "{% $states.input.submitError.Error %}"
                details:
                  cause: "{% $states.input.submitError.Cause %}"
    Output: "{% $merge([$states.input, { 'resolutionResult': $states.result }]) %}"
    Next: SubmitToBlockchain
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "Resolution failed - stay parked and wait again"
        Output: "{% $merge([$states.input, { 'submitError': $states.errorOutput }]) %}"
        Next: WaitForSubmitResolution

  # === TRANSACTION STATUS CHECK STEP ===

  ExtractTransactionHash:
    Type: Pass
    Parameters:
      submit.$: $.submit
      hash.$: $.hash
      executionId.$: $$.Execution.Name
      county.$: $.pre.county_name
      transactionHash.$: $.submit.result.submitResults[0].transactionHash
      transactionItems.$: $.hash.transactionItems
    ResultPath: $.transactionStatus
    Next: CheckTransactionStatusIfHashExists

  CheckTransactionStatusIfHashExists:
    Type: Choice
    Comment: "Only check transaction status if hash exists"
    Choices:
      - Variable: $.transactionStatus.transactionHash
        IsPresent: true
        Next: EmitTransactionStatusCheckScheduled
    Default: WorkflowComplete

  EmitTransactionStatusCheckScheduled:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SCHEDULED event for Transaction Status Check step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SCHEDULED
            phase: TransactionStatusCheck
            step: CheckTransactionStatus
    ResultPath: $.eventResult
    Next: PrepareTransactionStatusCheckDetail
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: PrepareTransactionStatusCheckDetail

  PrepareTransactionStatusCheckDetail:
    Type: Pass
    Parameters:
      transactionHash.$: $.transactionStatus.transactionHash
      transactionItems.$: $.transactionStatus.transactionItems
    ResultPath: $.transactionStatusCheckInput
    Next: InitializeTransactionStatusRetry

  InitializeTransactionStatusRetry:
    Type: Pass
    Comment: "Initialize transaction status retry counter to 0"
    Result: 0
    ResultPath: $.txStatusRetryCount
    Next: CheckTransactionStatus

  CheckTransactionStatus:
    Type: Task
    Resource: arn:aws:states:::sqs:sendMessage.waitForTaskToken
    Comment: "Check transaction status on blockchain - routes based on error code"
    Parameters:
      QueueUrl: ${TransactionStatusCheckerSqsQueueUrl}
      MessageBody.$: States.JsonToString($.transactionStatusCheckInput)
      MessageAttributes:
        TaskToken:
          DataType: String
          StringValue.$: $$.Task.Token
        ExecutionArn:
          DataType: String
          StringValue.$: $$.Execution.Name
        County:
          DataType: String
          StringValue.$: $.pre.county_name
        DataGroupLabel:
          DataType: String
          StringValue: "County"
        TransactionHash:
          DataType: String
          StringValue.$: $.transactionStatus.transactionHash
    ResultSelector:
      taskToken.$: $$.Task.Token
      result.$: $
    ResultPath: $.transactionStatusCheck
    Next: EmitTransactionStatusCheckSucceeded
    Catch:
      # 60004: PENDING - transaction in mempool, wait and retry
      - ErrorEquals: ["60004"]
        ResultPath: $.transactionStatusError
        Next: HandleTransactionPending
      # 60005: NOT_FOUND - transaction dropped, go back to gas price check (resubmit)
      - ErrorEquals: ["60005"]
        ResultPath: $.transactionStatusError
        Next: HandleTransactionNotFound
      # 60003: FAILED - transaction reverted, wait for resolution then resubmit
      - ErrorEquals: ["60003"]
        ResultPath: $.transactionStatusError
        Next: HandleTransactionFailed
      # 60006 or other: GENERAL_ERROR - wait for resolution then retry status check
      - ErrorEquals: [States.ALL]
        ResultPath: $.transactionStatusError
        Next: HandleTransactionGeneralError

  # === PENDING: Retry indefinitely with exponential backoff (2^n seconds, max 12 hours) ===

  HandleTransactionPending:
    Type: Pass
    Comment: "Transaction pending - proceed to exponential backoff wait"
    Next: CalculateTransactionStatusWait

  CalculateTransactionStatusWait:
    Type: Pass
    QueryLanguage: JSONata
    Comment: "Calculate exponential backoff wait time: min(2^retryCount * 60, 43200) seconds (max 12 hours)"
    Output: >-
      {%
        (
          $baseInterval := 60;
          $maxInterval := 43200;
          $calculated := $power(2, $states.input.txStatusRetryCount) * $baseInterval;
          $waitSeconds := $min([$calculated, $maxInterval]);
          $merge([$states.input, {
            "txStatusRetryCount": $states.input.txStatusRetryCount + 1,
            "txStatusWaitSeconds": $waitSeconds
          }])
        )
      %}
    Next: WaitForTransactionStatus

  WaitForTransactionStatus:
    Type: Wait
    Comment: "Wait with exponential backoff before checking transaction status again"
    SecondsPath: $.txStatusWaitSeconds
    Next: CheckTransactionStatus

  # === NOT_FOUND: Transaction dropped, go back to gas price check (resubmit) ===

  HandleTransactionNotFound:
    Type: Pass
    Comment: "Transaction not found (dropped), prepare to resubmit"
    Next: EmitTransactionStatusCheckFailedThenResubmit

  # === FAILED: Transaction reverted, wait for resolution then resubmit ===

  HandleTransactionFailed:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    QueryLanguage: JSONata
    Comment: "Emit FAILED event for transaction that reverted on blockchain"
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: TransactionStatusCheck
            step: CheckTransactionStatus
            dataGroupLabel: County
            errors:
              - code: "60003"
                details:
                  cause: "{% $states.input.transactionStatusError.Cause %}"
    Output: "{% $merge([$states.input, { 'eventResult': $states.result }]) %}"
    Next: WaitForTransactionFailedResolution
    Catch:
      - ErrorEquals: [States.ALL]
        Output: "{% $merge([$states.input, { 'eventError': $states.errorOutput }]) %}"
        Next: WaitForTransactionFailedResolution

  WaitForTransactionFailedResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    QueryLanguage: JSONata
    Comment: "Wait for resolution of failed transaction - then go back to gas price check (resubmit)"
    HeartbeatSeconds: 2592000 # 30 days
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: TransactionStatusCheck
            step: CheckTransactionStatus
            dataGroupLabel: County
            taskToken: "{% $states.context.Task.Token %}"
            errors:
              - code: "60003"
                details:
                  cause: "{% $states.input.transactionStatusError.Cause %}"
    Output: "{% $merge([$states.input, { 'resolutionResult': $states.result }]) %}"
    Next: GetGasPriceFromDynamoDB
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "Resolution failed - stay parked and wait again"
        Output: "{% $merge([$states.input, { 'transactionStatusError': $states.errorOutput }]) %}"
        Next: WaitForTransactionFailedResolution

  # === GENERAL_ERROR: Wait for resolution then retry status check ===

  HandleTransactionGeneralError:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    QueryLanguage: JSONata
    Comment: "Emit FAILED event for general error (RPC, config, etc.)"
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: TransactionStatusCheck
            step: CheckTransactionStatus
            dataGroupLabel: County
            errors:
              - code: "{% $states.input.transactionStatusError.Error %}"
                details:
                  cause: "{% $states.input.transactionStatusError.Cause %}"
    Output: "{% $merge([$states.input, { 'eventResult': $states.result }]) %}"
    Next: WaitForTransactionGeneralErrorResolution
    Catch:
      - ErrorEquals: [States.ALL]
        Output: "{% $merge([$states.input, { 'eventError': $states.errorOutput }]) %}"
        Next: WaitForTransactionGeneralErrorResolution

  WaitForTransactionGeneralErrorResolution:
    Type: Task
    Resource: arn:aws:states:::events:putEvents.waitForTaskToken
    QueryLanguage: JSONata
    Comment: "Wait for resolution of general error - then retry status check"
    HeartbeatSeconds: 2592000 # 30 days
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: TransactionStatusCheck
            step: CheckTransactionStatus
            dataGroupLabel: County
            taskToken: "{% $states.context.Task.Token %}"
            errors:
              - code: "{% $states.input.transactionStatusError.Error %}"
                details:
                  cause: "{% $states.input.transactionStatusError.Cause %}"
    Output: "{% $merge([$states.input, { 'resolutionResult': $states.result }]) %}"
    Next: InitializeTransactionStatusRetry
    Catch:
      - ErrorEquals: [States.ALL]
        Comment: "Resolution failed - stay parked and wait again"
        Output: "{% $merge([$states.input, { 'transactionStatusError': $states.errorOutput }]) %}"
        Next: WaitForTransactionGeneralErrorResolution

  # === RESUBMIT: Emit failure event then go back to gas price check ===

  EmitTransactionStatusCheckFailedThenResubmit:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    QueryLanguage: JSONata
    Comment: "Emit FAILED event then go back to gas price check (resubmit transaction)"
    Arguments:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId: "{% $states.context.Execution.Name %}"
            county: "{% $states.input.pre.county_name %}"
            status: FAILED
            phase: TransactionStatusCheck
            step: CheckTransactionStatus
            dataGroupLabel: County
            errors:
              - code: "{% $states.input.transactionStatusError.Error %}"
                details:
                  cause: "{% $states.input.transactionStatusError.Cause %}"
    Output: "{% $merge([$states.input, { 'eventResult': $states.result }]) %}"
    Next: InitializeGasPriceRetry
    Catch:
      - ErrorEquals: [States.ALL]
        Output: "{% $merge([$states.input, { 'eventError': $states.errorOutput }]) %}"
        Next: InitializeGasPriceRetry

  EmitTransactionStatusCheckSucceeded:
    Type: Task
    Resource: arn:aws:states:::events:putEvents
    Comment: "Emit SUCCEEDED event for Transaction Status Check step"
    Parameters:
      Entries:
        - Source: elephant.workflow
          DetailType: WorkflowEvent
          Detail:
            executionId.$: $$.Execution.Name
            county.$: $.pre.county_name
            status: SUCCEEDED
            phase: TransactionStatusCheck
            step: CheckTransactionStatus
    ResultPath: $.eventResult
    Next: WorkflowComplete
    Catch:
      - ErrorEquals: [States.ALL]
        ResultPath: $.eventError
        Next: WorkflowComplete

  WorkflowComplete:
    Type: Succeed
